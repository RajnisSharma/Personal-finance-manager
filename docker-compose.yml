version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pfm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      FRONTEND_URL: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pfm_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PFM_WEBHOOK_SECRET: dev-webhook-secret
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECURE_SSL_REDIRECT: "False"
    depends_on:
      - db
      - redis
    command: sh -c "python manage.py migrate && gunicorn finance_manager.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  worker:
    build:
      context: ./backend
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      FRONTEND_URL: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pfm_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PFM_WEBHOOK_SECRET: dev-webhook-secret
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECURE_SSL_REDIRECT: "False"
    depends_on:
      - db
      - redis
      - backend
    command: celery -A finance_manager.celery worker --loglevel=info

  beat:
    build:
      context: ./backend
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      FRONTEND_URL: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pfm_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PFM_WEBHOOK_SECRET: dev-webhook-secret
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECURE_SSL_REDIRECT: "False"
    depends_on:
      - db
      - redis
      - backend
    command: celery -A finance_manager.celery beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
